var NSK = "pc.c-e62c142a74";
function b64ToBytes(b64){var s=atob(b64);var a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function deriveKey(pass,salt,iters){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:iters,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function decryptPayload(pass){
  var key=await deriveKey(pass,b64ToBytes(PAYLOAD.salt),PAYLOAD.iters);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(PAYLOAD.iv)},key,b64ToBytes(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}
function getKeyFromHash(){
  var h=location.hash||"";if(h[0]==="#")h=h.slice(1);
  var parts=h.split("&");
  for(var i=0;i<parts.length;i++){var kv=parts[i].split("=");if(kv[0]==="k")return decodeURIComponent(kv[1]||"");}
  return null;
}
async function tryUnlock(pass,fromHash){
  var err=document.getElementById("lockErr"),spin=document.getElementById("lockSpin");
  err.textContent="";spin.textContent="Opening...";
  try{
    var json=await decryptPayload(pass);
    var data=JSON.parse(json);
    spin.textContent="";
    try{localStorage.setItem(NSK,pass);}catch(e){}
    document.getElementById("lock").style.display="none";
    var c=document.getElementById("card");
    c.innerHTML=data.html||"";
    c.style.display="block";
    if(data.title)document.title=data.title;
    window.scrollTo(0,0);
  }catch(e){
    spin.textContent="";
    err.textContent=fromHash?"Saved link could not open it. Enter the passphrase.":"Wrong passphrase. Try again.";
    document.getElementById("passIn").focus();
  }
}
(function init(){
  document.getElementById("unlockBtn").onclick=function(){tryUnlock(document.getElementById("passIn").value.trim(),false);};
  document.getElementById("passIn").addEventListener("keydown",function(e){if(e.key==="Enter")tryUnlock(this.value.trim(),false);});
  var k=getKeyFromHash()||(function(){try{return localStorage.getItem(NSK);}catch(e){return null;}})();
  if(k){document.getElementById("lockMsg").textContent="Opening...";tryUnlock(k,true);}
  else{document.getElementById("passIn").focus();}
})();
