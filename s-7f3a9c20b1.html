<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>Study Deck</title>
<!--
  Encrypted study deck. This file is safe to host publicly: it contains only an
  AES-GCM ciphertext plus the decrypt logic. No plaintext content, no identifiers.
  The decryption key is supplied at open time via the URL fragment (#k=...), which
  browsers never transmit to the server and which is not stored in this file, or
  typed into the passphrase field. Content is decrypted and rendered entirely in
  the browser. Mobile-safe CSS: explicit hex colors only; no CSS custom
  properties and no color blends, which have blanked pages in some iOS webviews.
-->
<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#0b1020; color:#e9eefa;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.5; padding:0 0 96px; -webkit-text-size-adjust:100%}
  .wrap{max-width:780px; margin:0 auto; padding:0 16px}

  /* lock screen */
  #lock{min-height:80vh; display:flex; align-items:center; justify-content:center; padding:24px}
  #lock .box{max-width:420px; width:100%; background:#0e1a31; border:1px solid #21304f; border-radius:14px; padding:22px}
  #lock h1{font-size:18px; margin:0 0 6px}
  #lock p{color:#93a6c6; font-size:13.5px; margin:0 0 14px}
  #lock input{width:100%; background:#0a1426; border:1px solid #2a3a5e; color:#e9eefa; border-radius:10px; padding:11px 12px; font-size:15px; margin-bottom:10px}
  #lock button{width:100%; background:#2f78c4; color:#fff; border:1px solid #6aa6e6; border-radius:10px; padding:11px 14px; font-size:14px; font-weight:600; cursor:pointer}
  #lock .err{color:#ff6b6b; font-size:13px; min-height:18px; margin-top:8px}
  #lock .spin{color:#93a6c6; font-size:13px; margin-top:8px}

  /* app (hidden until unlocked) */
  #app{display:none}
  header.top{position:sticky; top:0; z-index:30; background:#0b1020; padding:14px 0 8px}
  .title{font-size:19px; font-weight:700}
  .subtitle{color:#93a6c6; font-size:13px; margin-top:1px}
  .gaugebar{display:flex; align-items:center; gap:12px; margin-top:10px}
  .gauge{flex:1; height:12px; background:#0e1a31; border:1px solid #21304f; border-radius:999px; overflow:hidden}
  .gauge > i{display:block; height:100%; width:0%; background:#2f78c4}
  .gaugelabel{font-size:12px; color:#93a6c6; white-space:nowrap; min-width:128px; text-align:right}
  .gaugelabel b{color:#e9eefa}
  .streak{font-size:12px; color:#e6b15a; white-space:nowrap}
  .small{font-size:12px; color:#93a6c6}

  nav.tabs{position:sticky; top:0; z-index:20; display:flex; gap:6px; overflow-x:auto; padding:8px 16px; background:#0b1020; border-bottom:1px solid #21304f; -webkit-overflow-scrolling:touch}
  nav.tabs button{flex:0 0 auto; background:#101c33; color:#9db4d8; border:1px solid #21304f; padding:8px 13px; border-radius:999px; font-size:13px; font-weight:600; cursor:pointer}
  nav.tabs button.active{background:#0b69c4; color:#fff; border-color:#6aa6e6}

  section{display:none; padding-top:14px}
  section.active{display:block}
  h2.sec{font-size:16px; margin:4px 0 10px}
  p.lead{color:#93a6c6; font-size:14px; margin:0 0 14px}

  .card{background:#0e1a31; border:1px solid #21304f; border-radius:14px; padding:14px 16px; margin:0 0 12px}
  .card h3{margin:0 0 4px; font-size:15px}
  .card .oneliner{color:#93a6c6; font-size:13px; margin-bottom:8px; font-style:italic}
  .content{font-size:14.5px}
  .content strong{color:#fff}
  .content code{background:#0a1426; border:1px solid #21304f; border-radius:6px; padding:1px 5px; font-size:13px; color:#cfe0fb}
  .content ul{margin:6px 0; padding-left:20px}
  .content li{margin:3px 0}
  .content p{margin:8px 0}
  .musts{margin-top:10px; background:#0a1426; border:1px dashed #2a3a5e; border-radius:10px; padding:10px 12px}
  .musts .h{font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#e6b15a; margin-bottom:6px}
  .musts ul{margin:0; padding-left:18px}
  .musts li{font-size:13px; margin:3px 0; color:#dce7fb}

  .pill{display:inline-block; font-size:10px; font-weight:700; letter-spacing:.08em; padding:2px 8px; border-radius:999px; vertical-align:middle}

  .btn{appearance:none; border:1px solid #6aa6e6; background:#2f78c4; color:#fff; font-size:13px; font-weight:600; padding:9px 14px; border-radius:10px; cursor:pointer}
  .btn.ghost{background:#0e1a31; color:#bcd6f5; border-color:#2f78c4}
  .btn.sm{padding:6px 11px; font-size:12px}
  .btnrow{display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; align-items:center}
  .spacer{flex:1}
  .donemark{color:#3ec98a; font-size:13px; font-weight:700}

  .layer{border:1px solid #21304f; border-radius:12px; margin:0 0 10px; overflow:hidden}
  .layer > .lh{background:#0e1a31; padding:9px 12px; border-bottom:1px solid #21304f}
  .layer .ln{font-weight:700; font-size:14px}
  .layer .ls{color:#93a6c6; font-size:12px}
  .boxes{display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; padding:10px}
  .dbox{background:#16243f; border:1px solid #2a3a5e; border-radius:10px; padding:9px 10px; cursor:pointer}
  .dbox.BUILD{background:#2f78c4; border-color:#6aa6e6}
  .dbox.RIDE{background:#0e1a31; border:1.5px solid #2f78c4}
  .dbox.LATER{background:#0e1a31; border:1px dashed #33425f; opacity:.85}
  .dbox .bn{font-size:13px; font-weight:600; color:#d4ddef}
  .dbox.BUILD .bn{color:#fff}
  .dbox .bt{font-size:9.5px; font-weight:700; letter-spacing:.06em; margin-top:3px; opacity:.85}
  .legend{display:flex; gap:14px; flex-wrap:wrap; font-size:12px; color:#93a6c6; margin:6px 2px 14px}
  .legend span{display:inline-flex; align-items:center; gap:6px}
  .swatch{width:13px; height:13px; border-radius:4px; display:inline-block}

  .flash{margin:10px 0}
  .flashinner{position:relative; min-height:160px; cursor:pointer}
  .face{display:flex; align-items:center; justify-content:center; text-align:center; padding:22px; border-radius:14px; border:1px solid #21304f; min-height:160px}
  .face.front{font-size:17px; font-weight:600; background:#0e1a31}
  .face.back{background:#0a1426; font-size:15px; color:#dce7fb}
  .facetag{position:absolute; top:8px; left:12px; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#93a6c6}
  .ratebtns{display:flex; gap:8px; margin-top:10px}
  .ratebtns .btn{flex:1; text-align:center}
  .rate-missed{background:#36161a; border-color:#ff6b6b; color:#ffd9d9}
  .rate-fuzzy{background:#33260c; border-color:#e6b15a; color:#ffe9c2}
  .rate-got{background:#10311f; border-color:#3ec98a; color:#c8f4dd}
  .progresshint{font-size:12px; color:#93a6c6; text-align:center; margin-top:8px}

  .choices{display:flex; flex-direction:column; gap:8px; margin-top:10px}
  .choice{text-align:left; background:#16243f; border:1px solid #2a3a5e; color:#e9eefa; padding:11px 13px; border-radius:10px; font-size:14px; cursor:pointer}
  .choice.correct{background:#10311f; border-color:#3ec98a; color:#d6f7e6}
  .choice.wrong{background:#36161a; border-color:#ff6b6b; color:#ffd9d9}
  .explain{margin-top:10px; font-size:13.5px; color:#cfe0fb; background:#0a1426; border:1px solid #21304f; border-left:3px solid #6aa6e6; border-radius:8px; padding:10px 12px}
  .qmeta{display:flex; justify-content:space-between; font-size:12px; color:#93a6c6; margin-bottom:6px}

  .reveal{margin-top:10px; font-size:14px; color:#dce7fb; background:#0a1426; border:1px solid #21304f; border-radius:10px; padding:12px 14px}
  .hint{font-size:12.5px; color:#e6b15a; margin-top:8px}
  .rubric{margin-top:8px; font-size:13px}
  .rubric li{margin:4px 0}

  /* listen / audio */
  .player{position:sticky; top:52px; z-index:15; background:#0a1426; border:1px solid #21304f; border-radius:12px; padding:12px; margin-bottom:12px}
  .player .now{font-size:13px; color:#bcd6f5; margin-bottom:8px; min-height:18px}
  .player .ctrls{display:flex; gap:8px; flex-wrap:wrap; align-items:center}
  .player select{background:#16243f; color:#e9eefa; border:1px solid #2a3a5e; border-radius:8px; padding:7px 9px; font-size:12px}
  .lrow{display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid #21304f; font-size:14px}
  .lrow:last-child{border-bottom:none}
  .lrow.playing{color:#7fd1ff; font-weight:600}
  .lrow .ix{color:#93a6c6; font-size:12px; min-width:22px}
  .lrow .pl{margin-left:auto}
  .warnbox{font-size:12px; color:#e6b15a; background:#33260c; border:1px solid #e6b15a; border-radius:8px; padding:9px 11px; margin-bottom:12px}

  .stat{display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #21304f; font-size:14px}
  .stat:last-child{border-bottom:none}
  .stat .v{font-weight:700}
  .danger{color:#ff6b6b}
  a{color:#7fb6f2}
  .kbd{font-size:11px; color:#93a6c6; margin-top:10px; text-align:center}
  .toast{position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#0a1426; border:1px solid #6aa6e6; color:#dce7fb; padding:9px 16px; border-radius:999px; font-size:13px; opacity:0; pointer-events:none; transition:opacity .3s; z-index:50}
  .toast.show{opacity:1}
</style>
</head>
<body>

<div id="lock">
  <div class="box">
    <h1>Private study deck</h1>
    <p id="lockMsg">These notes are encrypted. Enter your passphrase to unlock, or open your personal link to unlock automatically.</p>
    <input id="passIn" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="passphrase" />
    <button id="unlockBtn">Unlock</button>
    <div class="err" id="lockErr"></div>
    <div class="spin" id="lockSpin"></div>
  </div>
</div>

<div id="app">
  <header class="top">
    <div class="wrap">
      <div class="title" id="appTitle"></div>
      <div class="subtitle" id="appSub"></div>
      <div class="gaugebar">
        <div class="gauge"><i id="gaugeFill"></i></div>
        <div class="gaugelabel"><b id="readyPct">0%</b> <span id="readyLabel">ready</span></div>
      </div>
      <div class="gaugebar" style="margin-top:6px">
        <div class="streak" id="streak">&nbsp;</div>
        <div class="spacer"></div>
        <div class="small" id="presentIn">&nbsp;</div>
      </div>
    </div>
  </header>
  <nav class="tabs wrap" id="tabs"></nav>
  <main class="wrap">
    <section id="tab-learn"></section>
    <section id="tab-diagram"></section>
    <section id="tab-listen"></section>
    <section id="tab-flash"></section>
    <section id="tab-quiz"></section>
    <section id="tab-defend"></section>
    <section id="tab-teach"></section>
    <section id="tab-progress"></section>
  </main>
</div>

<div class="toast" id="toast"></div>

// ===== crypto (WebCrypto, matches the Node build params) =====
function b64ToBytes(b64){ var s=atob(b64); var a=new Uint8Array(s.length); for(var i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a; }
async function deriveKey(pass, salt, iters){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:salt, iterations:iters, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
async function decryptPayload(pass){
  var key=await deriveKey(pass, b64ToBytes(PAYLOAD.salt), PAYLOAD.iters);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(PAYLOAD.iv)}, key, b64ToBytes(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}

// ===== unlock flow =====
function getKeyFromHash(){
  var h=location.hash||""; if(h[0]==="#") h=h.slice(1);
  var parts=h.split("&");
  for(var i=0;i<parts.length;i++){ var kv=parts[i].split("="); if(kv[0]==="k") return decodeURIComponent(kv[1]||""); }
  return null;
}
async function tryUnlock(pass, fromHash){
  var err=document.getElementById("lockErr"), spin=document.getElementById("lockSpin");
  err.textContent=""; spin.textContent="Unlocking...";
  try{
    var json=await decryptPayload(pass);
    var data=JSON.parse(json);
    spin.textContent="";
    try{ localStorage.setItem("drxw1.k", pass); }catch(e){}
    document.getElementById("lock").style.display="none";
    document.getElementById("app").style.display="block";
    startApp(data);
  }catch(e){
    spin.textContent="";
    err.textContent = fromHash ? "Saved link could not unlock. Enter your passphrase." : "Wrong passphrase. Try again.";
    document.getElementById("passIn").focus();
  }
}
(function initLock(){
  document.getElementById("unlockBtn").onclick=function(){ tryUnlock(document.getElementById("passIn").value.trim(), false); };
  document.getElementById("passIn").addEventListener("keydown",function(e){ if(e.key==="Enter") tryUnlock(this.value.trim(), false); });
  var k=getKeyFromHash() || (function(){ try{ return localStorage.getItem("drxw1.k"); }catch(e){ return null; } })();
  if(k){ document.getElementById("lockMsg").textContent="Unlocking your deck..."; tryUnlock(k, true); }
  else { document.getElementById("passIn").focus(); }
})();

// ===== the app (runs after decryption) =====
function startApp(DATA){
  document.getElementById("appTitle").textContent=DATA.meta.title;
  document.getElementById("appSub").textContent=DATA.meta.subtitle;

  var NS="drxw1";
  function load(k,d){ try{ var v=localStorage.getItem(NS+"."+k); return v==null?d:JSON.parse(v); }catch(e){ return d; } }
  function save(k,v){ try{ localStorage.setItem(NS+"."+k, JSON.stringify(v)); }catch(e){} }
  var ST={ modules:load("modules",{}), cards:load("cards",{}), quiz:load("quiz",{best:0,attempts:0,last:0,perQ:{}}),
           defend:load("defend",{}), teach:load("teach",{}), streak:load("streak",{lastDay:null,count:0}), tab:load("tab","learn") };

  function today(){ var d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  (function bump(){ var t=today(); if(ST.streak.lastDay===t) return; var y=new Date(); y.setDate(y.getDate()-1);
    var ys=y.getFullYear()+"-"+String(y.getMonth()+1).padStart(2,"0")+"-"+String(y.getDate()).padStart(2,"0");
    ST.streak.count=(ST.streak.lastDay===ys)?(ST.streak.count+1):1; ST.streak.lastDay=t; save("streak",ST.streak); })();

  function mdInline(s){ s=s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    s=s.replace(/\*\*(.+?)\*\*/g,"<strong>$1</strong>"); s=s.replace(/`(.+?)`/g,"<code>$1</code>"); return s; }
  function mdBlock(text){ var lines=text.split("\n"), html="", inList=false;
    for(var i=0;i<lines.length;i++){ var ln=lines[i];
      if(/^\s*-\s+/.test(ln)){ if(!inList){html+="<ul>";inList=true;} html+="<li>"+mdInline(ln.replace(/^\s*-\s+/,""))+"</li>"; }
      else { if(inList){html+="</ul>";inList=false;} if(ln.trim()==="") continue; html+="<p>"+mdInline(ln)+"</p>"; } }
    if(inList) html+="</ul>"; return html; }
  function stripMd(text){ return text.replace(/\*\*(.+?)\*\*/g,"$1").replace(/`(.+?)`/g,"$1").replace(/^\s*-\s+/gm,"").replace(/\n+/g,". ").replace(/\s+/g," ").trim(); }
  function toast(m){ var t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove("show");},1600); }

  function pctModules(){ var n=DATA.modules.length,c=0; DATA.modules.forEach(function(m){ if(ST.modules[m.id]) c++; }); return n?c/n:0; }
  function pctCards(){ var n=DATA.flashcards.length,c=0; DATA.flashcards.forEach(function(f){ var s=ST.cards[f.id]; if(s&&s.box>=4) c++; }); return n?c/n:0; }
  function pctQuiz(){ return (ST.quiz.best||0)/100; }
  function pctDefend(){ var n=DATA.objections.length,c=0; DATA.objections.forEach(function(o){ if((ST.defend[o.id]||0)>=2) c++; }); return n?c/n:0; }
  function pctTeach(){ var n=DATA.teachback.length,c=0; DATA.teachback.forEach(function(t){ if((ST.teach[t.id]||0)>=2) c++; }); return n?c/n:0; }
  function readiness(){ return Math.round(100*(0.30*pctModules()+0.25*pctQuiz()+0.20*pctCards()+0.15*pctDefend()+0.10*pctTeach())); }
  function readyLabel(p){ if(p>=90)return"presentation-ready"; if(p>=75)return"nearly there"; if(p>=50)return"getting solid"; if(p>=25)return"warming up"; return"just starting"; }
  function refreshGauge(){ var p=readiness(); document.getElementById("gaugeFill").style.width=p+"%";
    document.getElementById("readyPct").textContent=p+"%"; document.getElementById("readyLabel").textContent=readyLabel(p);
    var s=ST.streak.count||0; document.getElementById("streak").textContent=s>0?("streak: "+s+" day"+(s>1?"s":"")):"";
    document.getElementById("presentIn").textContent="present: "+DATA.meta.present; }

  var TABS=[["learn","Learn"],["diagram","Diagram"],["listen","Listen"],["flash","Flashcards"],["quiz","Quiz"],["defend","Defend"],["teach","Teach-back"],["progress","Progress"]];
  var nav=document.getElementById("tabs");
  TABS.forEach(function(t){ var b=document.createElement("button"); b.textContent=t[1]; b.dataset.tab=t[0]; b.onclick=function(){ setTab(t[0]); }; nav.appendChild(b); });
  function setTab(name){ ST.tab=name; save("tab",name);
    Array.prototype.forEach.call(nav.children,function(b){ b.classList.toggle("active", b.dataset.tab===name); });
    Array.prototype.forEach.call(document.querySelectorAll("main section"),function(s){ s.classList.toggle("active", s.id==="tab-"+name); });
    if(name==="flash") renderFlash(); if(name==="progress") renderProgress(); if(name!=="listen") stopAudio();
    window.scrollTo(0,0); }

  // ---- LEARN ----
  function renderLearn(){ var el=document.getElementById("tab-learn"); el.innerHTML="";
    el.innerHTML+="<h2 class='sec'>Learn the design, module by module</h2><p class='lead'>Read each module, then mark it understood. Provenance first.</p>";
    var pv=DATA.provenance, pvc=document.createElement("div"); pvc.className="card";
    pvc.innerHTML="<h3>Read this first: what is theirs, what is yours</h3><div class='content'>"+
      "<p><strong>Theirs:</strong> "+mdInline(pv.theirs)+"</p><p><strong>Yours:</strong> "+mdInline(pv.ours)+"</p>"+
      "<p><strong>Soft spots to flag out loud:</strong></p><ul>"+pv.soft.map(function(s){return "<li>"+mdInline(s)+"</li>";}).join("")+"</ul>"+
      "<p><strong>The rule:</strong> "+mdInline(pv.rule)+"</p></div>"; el.appendChild(pvc);
    DATA.modules.forEach(function(m,idx){ var c=document.createElement("div"); c.className="card"; var done=!!ST.modules[m.id];
      c.innerHTML="<h3>"+(idx+1)+". "+m.title+" <span class='small'>("+m.minutes+" min)</span></h3>"+
        "<div class='oneliner'>"+mdInline(m.oneLiner)+"</div><div class='content'>"+mdBlock(m.body)+"</div>"+
        "<div class='musts'><div class='h'>Must hold</div><ul>"+m.musts.map(function(x){return "<li>"+mdInline(x)+"</li>";}).join("")+"</ul></div>"+
        "<div class='btnrow'><button class='btn ghost sm' data-say='"+m.id+"'>Listen to this</button>"+
          "<button class='btn "+(done?"ghost":"")+"' data-mod='"+m.id+"'>"+(done?"Understood":"Mark understood")+"</button>"+
          "<span class='donemark' style='"+(done?"":"display:none")+"'>done</span></div>"; el.appendChild(c); });
    el.querySelectorAll("button[data-mod]").forEach(function(b){ b.onclick=function(){ var id=b.dataset.mod; ST.modules[id]=!ST.modules[id]; save("modules",ST.modules);
      var done=ST.modules[id]; b.textContent=done?"Understood":"Mark understood"; b.classList.toggle("ghost",done);
      b.parentNode.querySelector(".donemark").style.display=done?"":"none"; if(done) toast("Module marked understood"); refreshGauge(); }; });
    el.querySelectorAll("button[data-say]").forEach(function(b){ b.onclick=function(){ var m=DATA.modules.filter(function(x){return x.id===b.dataset.say;})[0];
      setTab("listen"); setTimeout(function(){ playQueue([m.title+".", m.oneLiner, stripMd(m.body)], m.id); },120); }; });
  }

  // ---- DIAGRAM ----
  function renderDiagram(){ var el=document.getElementById("tab-diagram"); el.innerHTML="";
    el.innerHTML+="<h2 class='sec'>The architecture, with your footprint</h2><p class='lead'>"+mdInline(DATA.diagram.note)+"</p>"+
      "<div class='legend'><span><i class='swatch' style='background:#2f78c4'></i>BUILD, you implement it</span>"+
      "<span><i class='swatch' style='background:#0e1a31;border:1.5px solid #2f78c4'></i>RIDE, you consume it</span>"+
      "<span><i class='swatch' style='background:#0e1a31;border:1px dashed #33425f'></i>LATER, out of scope</span></div>";
    DATA.diagram.layers.forEach(function(L){ var d=document.createElement("div"); d.className="layer";
      var bx=L.boxes.map(function(b){ return "<div class='dbox "+b.tag+"' data-name=\""+b.name.replace(/"/g,"&quot;")+"\" data-sub=\""+(b.sub||"").replace(/"/g,"&quot;")+"\" data-tag='"+b.tag+"'><div class='bn'>"+b.name+"</div><div class='bt'>"+b.tag+"</div></div>"; }).join("");
      d.innerHTML="<div class='lh'><div class='ln'>"+L.name+"</div><div class='ls'>"+L.subtitle+"</div></div><div class='boxes'>"+bx+"</div>"; el.appendChild(d); });
    el.querySelectorAll(".dbox").forEach(function(b){ b.onclick=function(){ toast(b.dataset.name+" ["+b.dataset.tag+"]: "+b.dataset.sub); }; });
  }

  // ---- LISTEN (Web Speech API, chunked for iOS) ----
  var voices=[], qList=[], qIdx=0, qActive=false, curModuleId=null, resumeTimer=null, rate=1.0;
  function loadVoices(){ try{ voices=window.speechSynthesis ? speechSynthesis.getVoices() : []; }catch(e){ voices=[]; } }
  function pickVoice(){ if(!voices.length) loadVoices();
    var pref=voices.filter(function(v){ return /en[-_]/i.test(v.lang); });
    var nice=pref.filter(function(v){ return /samantha|daniel|karen|moira|google|natural|siri/i.test(v.name); });
    return (nice[0]||pref[0]||voices[0]||null); }
  function splitSentences(text){ var raw=text.split(/(?<=[.;:!?])\s+/); var out=[];
    raw.forEach(function(s){ s=s.trim(); if(!s) return; while(s.length>200){ var cut=s.lastIndexOf(" ",200); if(cut<60) cut=200; out.push(s.slice(0,cut)); s=s.slice(cut).trim(); } out.push(s); }); return out; }
  function stopAudio(){ qActive=false; qList=[]; qIdx=0; curModuleId=null; if(resumeTimer){ clearInterval(resumeTimer); resumeTimer=null; }
    try{ if(window.speechSynthesis) speechSynthesis.cancel(); }catch(e){} markListenRow(); updatePlayerNow(""); }
  function speakNext(){ if(!qActive || qIdx>=qList.length){ qActive=false; markListenRow(); updatePlayerNow("Done."); return; }
    var u=new SpeechSynthesisUtterance(qList[qIdx]); var v=pickVoice(); if(v) u.voice=v; u.rate=rate; u.pitch=1.0;
    u.onend=function(){ if(qActive){ qIdx++; speakNext(); } };
    u.onerror=function(){ if(qActive){ qIdx++; speakNext(); } };
    try{ speechSynthesis.speak(u); }catch(e){} }
  function playQueue(parts, moduleId){ if(!window.speechSynthesis){ toast("Audio not supported on this browser"); return; }
    stopAudio(); curModuleId=moduleId||null; var text=parts.join(". "); qList=splitSentences(text); qIdx=0; qActive=true;
    updatePlayerNow(moduleId?("Playing: "+moduleTitle(moduleId)):"Playing the full design"); markListenRow();
    resumeTimer=setInterval(function(){ try{ if(qActive && speechSynthesis.paused) speechSynthesis.resume(); }catch(e){} },4000);
    speakNext(); }
  function moduleTitle(id){ var m=DATA.modules.filter(function(x){return x.id===id;})[0]; return m?m.title:""; }
  function updatePlayerNow(t){ var n=document.getElementById("nowPlaying"); if(n) n.textContent=t; }
  function markListenRow(){ document.querySelectorAll(".lrow").forEach(function(r){ r.classList.toggle("playing", r.dataset.mid===curModuleId && qActive); }); }
  function fullNarration(){ var parts=[DATA.meta.title+".", DATA.meta.subtitle+".", "The product in one sentence: "+DATA.meta.product];
    parts.push("First, provenance. "+stripMd(DATA.provenance.theirs)+" "+stripMd(DATA.provenance.ours)+" "+stripMd(DATA.provenance.rule));
    DATA.modules.forEach(function(m){ parts.push("Module: "+m.title+". "+m.oneLiner+" "+stripMd(m.body)); }); return parts; }

  function renderListen(){ var el=document.getElementById("tab-listen"); el.innerHTML="";
    el.innerHTML="<h2 class='sec'>Listen to the design</h2><p class='lead'>Hands-free narration, good for resting your eyes. Tap a module, or play the whole thing.</p>"+
      "<div class='warnbox'>Uses your device's built-in voice. On iPhone, keep this tab open and the screen on while it plays; iOS pauses speech when the screen locks or you switch apps.</div>"+
      "<div class='player'><div class='now' id='nowPlaying'>Idle.</div><div class='ctrls'>"+
        "<button class='btn' id='playAll'>Play full design</button>"+
        "<button class='btn ghost sm' id='pausePlay'>Pause</button>"+
        "<button class='btn ghost sm' id='stopPlay'>Stop</button>"+
        "<label class='small'>speed <select id='spd'><option value='0.9'>0.9x</option><option value='1' selected>1.0x</option><option value='1.1'>1.1x</option><option value='1.25'>1.25x</option></select></label>"+
      "</div></div><div id='lhost'></div>";
    var host=document.getElementById("lhost");
    host.innerHTML=DATA.modules.map(function(m,i){ return "<div class='lrow' data-mid='"+m.id+"'><span class='ix'>"+(i+1)+"</span><span>"+m.title+"</span><button class='btn ghost sm pl' data-play='"+m.id+"'>Play</button></div>"; }).join("");
    host.querySelectorAll("button[data-play]").forEach(function(b){ b.onclick=function(){ var m=DATA.modules.filter(function(x){return x.id===b.dataset.play;})[0]; playQueue([m.title+".", m.oneLiner, stripMd(m.body)], m.id); }; });
    document.getElementById("playAll").onclick=function(){ playQueue(fullNarration(), null); };
    document.getElementById("stopPlay").onclick=function(){ stopAudio(); };
    document.getElementById("pausePlay").onclick=function(){ try{ if(speechSynthesis.paused){ speechSynthesis.resume(); this.textContent="Pause"; } else { speechSynthesis.pause(); this.textContent="Resume"; } }catch(e){} };
    document.getElementById("spd").onchange=function(){ rate=parseFloat(this.value); if(qActive){ var keepId=curModuleId, resume=qList.slice(qIdx); stopAudio(); qList=resume; qIdx=0; qActive=true; curModuleId=keepId; resumeTimer=setInterval(function(){ try{ if(qActive&&speechSynthesis.paused) speechSynthesis.resume(); }catch(e){} },4000); speakNext(); markListenRow(); } };
  }
  if(window.speechSynthesis){ loadVoices(); speechSynthesis.onvoiceschanged=loadVoices; }

  // ---- FLASHCARDS ----
  var flashOrder=[], flashPos=0, flashFlipped=false;
  function dueCards(){ var now=Date.now(), due=[], later=[]; DATA.flashcards.forEach(function(f){ var s=ST.cards[f.id]; if(!s||!s.due||s.due<=now) due.push(f); else later.push(f); });
    later.sort(function(a,b){ return ST.cards[a.id].box-ST.cards[b.id].box; }); return due.concat(later); }
  function renderFlash(){ var el=document.getElementById("tab-flash"); el.innerHTML=""; flashOrder=dueCards(); flashPos=0; flashFlipped=false;
    var mastered=0; DATA.flashcards.forEach(function(f){ var s=ST.cards[f.id]; if(s&&s.box>=4) mastered++; });
    el.innerHTML="<h2 class='sec'>Flashcards <span class='small'>("+mastered+"/"+DATA.flashcards.length+" mastered)</span></h2><p class='lead'>Tap to flip. Rate honestly; missed cards return sooner.</p><div id='flashHost'></div>"; drawFlash(); }
  function drawFlash(){ var host=document.getElementById("flashHost"); if(!host) return; if(!flashOrder.length){ host.innerHTML="<div class='card'>No cards.</div>"; return; }
    var f=flashOrder[flashPos%flashOrder.length], s=ST.cards[f.id]||{box:0};
    host.innerHTML="<div class='qmeta'><span>card "+((flashPos%flashOrder.length)+1)+" of "+flashOrder.length+"</span><span>box "+(s.box||0)+"/5</span></div>"+
      "<div class='flash' id='theFlash'><div class='flashinner'>"+(flashFlipped?
        "<div class='face back'><span class='facetag'>answer</span>"+mdInline(f.back)+"</div>":
        "<div class='face front'><span class='facetag'>"+(f.tags[0]||"")+"</span>"+mdInline(f.front)+"</div>")+"</div></div>"+
      (flashFlipped?"<div class='ratebtns'><button class='btn rate-missed' data-rate='0'>Missed</button><button class='btn rate-fuzzy' data-rate='1'>Fuzzy</button><button class='btn rate-got' data-rate='2'>Got it</button></div>":"<div class='progresshint'>tap card to reveal</div>");
    document.getElementById("theFlash").onclick=function(){ flashFlipped=!flashFlipped; drawFlash(); };
    if(flashFlipped) host.querySelectorAll("button[data-rate]").forEach(function(b){ b.onclick=function(ev){ ev.stopPropagation(); rateCard(f, parseInt(b.dataset.rate,10)); }; });
  }
  function rateCard(f, rating){ var s=ST.cards[f.id]||{box:0,seen:0}; s.seen=(s.seen||0)+1;
    if(rating===0) s.box=1; else if(rating===1) s.box=Math.max(1,s.box||0); else s.box=Math.min(5,(s.box||0)+1);
    var days=[0,1,2,4,7,15][s.box]||0; s.due=Date.now()+days*86400000; ST.cards[f.id]=s; save("cards",ST.cards);
    flashFlipped=false; flashPos++; if(flashPos>=flashOrder.length){ toast("Deck complete for now"); flashOrder=dueCards(); flashPos=0; } drawFlash(); refreshGauge(); }

  // ---- QUIZ ----
  var quizOrder=[], quizPos=0, quizScore=0, quizAnswered=false;
  function shuffle(a){ a=a.slice(); for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
  function renderQuiz(){ var el=document.getElementById("tab-quiz"); el.innerHTML="";
    el.innerHTML="<h2 class='sec'>Quiz</h2><p class='lead'>"+DATA.quiz.length+" questions, randomized, immediate feedback. Best: <b>"+(ST.quiz.best||0)+"%</b> over "+(ST.quiz.attempts||0)+" attempt"+((ST.quiz.attempts===1)?"":"s")+".</p>"+
      "<div class='btnrow'><button class='btn' id='startQuiz'>Start quiz</button>"+(ST.quiz.last?"<span class='small'>last: "+ST.quiz.last+"%</span>":"")+"</div><div id='quizHost'></div>";
    document.getElementById("startQuiz").onclick=startQuiz; }
  function startQuiz(){ quizOrder=shuffle(DATA.quiz); quizPos=0; quizScore=0; quizAnswered=false; drawQuiz(); }
  function drawQuiz(){ var host=document.getElementById("quizHost"); if(!host) return; if(quizPos>=quizOrder.length){ finishQuiz(); return; }
    var q=quizOrder[quizPos];
    host.innerHTML="<div class='card'><div class='qmeta'><span>question "+(quizPos+1)+" of "+quizOrder.length+"</span><span>score "+quizScore+"</span></div>"+
      "<div class='content'><strong>"+mdInline(q.q)+"</strong></div><div class='choices'>"+q.choices.map(function(c,i){ return "<button class='choice' data-i='"+i+"'>"+mdInline(c)+"</button>"; }).join("")+"</div>"+
      "<div id='qx'></div><div class='btnrow'><div class='spacer'></div><button class='btn' id='qnext' style='display:none'>Next</button></div></div>";
    quizAnswered=false; host.querySelectorAll(".choice").forEach(function(b){ b.onclick=function(){ answerQuiz(q, parseInt(b.dataset.i,10), host); }; }); }
  function answerQuiz(q,i,host){ if(quizAnswered) return; quizAnswered=true; var correct=q.answer;
    host.querySelectorAll(".choice").forEach(function(b){ var bi=parseInt(b.dataset.i,10); b.disabled=true; if(bi===correct) b.classList.add("correct"); if(bi===i&&i!==correct) b.classList.add("wrong"); });
    var ph=ST.quiz.perQ[q.id]||{right:0,wrong:0}; if(i===correct){ quizScore++; ph.right++; } else ph.wrong++; ST.quiz.perQ[q.id]=ph; save("quiz",ST.quiz);
    host.querySelector("#qx").innerHTML="<div class='explain'>"+(i===correct?"Correct. ":"Not quite. ")+mdInline(q.why)+"</div>";
    var nx=host.querySelector("#qnext"); nx.style.display=""; nx.textContent=(quizPos+1>=quizOrder.length)?"See score":"Next"; nx.onclick=function(){ quizPos++; drawQuiz(); }; }
  function finishQuiz(){ var pct=Math.round(100*quizScore/quizOrder.length); ST.quiz.attempts=(ST.quiz.attempts||0)+1; ST.quiz.last=pct; if(pct>(ST.quiz.best||0)) ST.quiz.best=pct; save("quiz",ST.quiz); refreshGauge();
    var host=document.getElementById("quizHost"); var msg=pct>=90?"That is presentation-ready.":pct>=70?"Solid. Close the gaps and go again.":"Keep going, review Learn then retry.";
    host.innerHTML="<div class='card'><h3>Score: "+pct+"%</h3><div class='content'><p>"+quizScore+" of "+quizOrder.length+" correct. Best: "+ST.quiz.best+"%. "+msg+"</p></div><div class='btnrow'><button class='btn' id='againQuiz'>Retake</button><button class='btn ghost' id='toLearn'>Back to Learn</button></div></div>";
    document.getElementById("againQuiz").onclick=startQuiz; document.getElementById("toLearn").onclick=function(){ setTab("learn"); }; }

  // ---- DEFEND ----
  function renderDefend(){ var el=document.getElementById("tab-defend"); el.innerHTML="";
    el.innerHTML="<h2 class='sec'>Defend the design</h2><p class='lead'>Answer aloud from memory first. Then reveal the model answer and rate yourself.</p>";
    DATA.objections.forEach(function(o,idx){ var conf=ST.defend[o.id]||0; var c=document.createElement("div"); c.className="card";
      c.innerHTML="<h3>"+(idx+1)+". "+mdInline(o.q)+"</h3><div class='hint'>nudge: "+mdInline(o.hint)+"</div>"+
        "<div class='btnrow'><button class='btn ghost sm' data-rev='"+o.id+"'>Reveal model answer</button><span class='small' id='conf-"+o.id+"'>"+(conf?("confidence: "+["","shaky","okay","solid"][conf]):"")+"</span></div>"+
        "<div class='reveal' id='rev-"+o.id+"' style='display:none'>"+mdInline(o.answer)+"<div class='ratebtns'><button class='btn rate-missed sm' data-conf='1' data-id='"+o.id+"'>Shaky</button><button class='btn rate-fuzzy sm' data-conf='2' data-id='"+o.id+"'>Okay</button><button class='btn rate-got sm' data-conf='3' data-id='"+o.id+"'>Solid</button></div></div>"; el.appendChild(c); });
    el.querySelectorAll("button[data-rev]").forEach(function(b){ b.onclick=function(){ var r=document.getElementById("rev-"+b.dataset.rev); r.style.display=(r.style.display==="none")?"":"none"; }; });
    el.querySelectorAll("button[data-conf]").forEach(function(b){ b.onclick=function(){ ST.defend[b.dataset.id]=parseInt(b.dataset.conf,10); save("defend",ST.defend);
      document.getElementById("conf-"+b.dataset.id).textContent="confidence: "+["","shaky","okay","solid"][b.dataset.conf]; toast("Logged"); refreshGauge(); }; });
  }

  // ---- TEACH-BACK ----
  function renderTeach(){ var el=document.getElementById("tab-teach"); el.innerHTML="";
    el.innerHTML="<h2 class='sec'>Teach it back</h2><p class='lead'>Explain it without notes, aloud. Check yourself against the rubric, then rate it.</p>";
    DATA.teachback.forEach(function(t,idx){ var r=ST.teach[t.id]||0; var c=document.createElement("div"); c.className="card";
      c.innerHTML="<h3>"+(idx+1)+". "+mdInline(t.prompt)+"</h3><div class='btnrow'><button class='btn ghost sm' data-rub='"+t.id+"'>Show rubric</button><span class='small' id='trate-"+t.id+"'>"+(r?("self-rating: "+["","needs work","okay","nailed it"][r]):"")+"</span></div>"+
        "<div class='reveal' id='rub-"+t.id+"' style='display:none'><div class='small'>Did you hit all of these?</div><ul class='rubric'>"+t.rubric.map(function(x){return "<li>"+mdInline(x)+"</li>";}).join("")+"</ul><div class='ratebtns'><button class='btn rate-missed sm' data-tr='1' data-id='"+t.id+"'>Needs work</button><button class='btn rate-fuzzy sm' data-tr='2' data-id='"+t.id+"'>Okay</button><button class='btn rate-got sm' data-tr='3' data-id='"+t.id+"'>Nailed it</button></div></div>"; el.appendChild(c); });
    el.querySelectorAll("button[data-rub]").forEach(function(b){ b.onclick=function(){ var r=document.getElementById("rub-"+b.dataset.rub); r.style.display=(r.style.display==="none")?"":"none"; }; });
    el.querySelectorAll("button[data-tr]").forEach(function(b){ b.onclick=function(){ ST.teach[b.dataset.id]=parseInt(b.dataset.tr,10); save("teach",ST.teach);
      document.getElementById("trate-"+b.dataset.id).textContent="self-rating: "+["","needs work","okay","nailed it"][b.dataset.tr]; toast("Logged"); refreshGauge(); }; });
  }

  // ---- PROGRESS ----
  function renderProgress(){ var el=document.getElementById("tab-progress"); el.innerHTML="";
    function row(l,v){ return "<div class='stat'><span>"+l+"</span><span class='v'>"+v+"</span></div>"; }
    var mc=0; DATA.modules.forEach(function(m){ if(ST.modules[m.id]) mc++; });
    var fc=0; DATA.flashcards.forEach(function(f){ var s=ST.cards[f.id]; if(s&&s.box>=4) fc++; });
    var dc=0; DATA.objections.forEach(function(o){ if((ST.defend[o.id]||0)>=2) dc++; });
    var tc=0; DATA.teachback.forEach(function(t){ if((ST.teach[t.id]||0)>=2) tc++; });
    el.innerHTML="<h2 class='sec'>Progress</h2><div class='card'>"+
      row("Overall readiness", readiness()+"% ("+readyLabel(readiness())+")")+row("Modules understood", mc+" / "+DATA.modules.length)+
      row("Flashcards mastered (box 4+)", fc+" / "+DATA.flashcards.length)+row("Quiz best score", (ST.quiz.best||0)+"%")+
      row("Quiz attempts", ST.quiz.attempts||0)+row("Objections solid", dc+" / "+DATA.objections.length)+
      row("Teach-backs okay+", tc+" / "+DATA.teachback.length)+row("Study streak", (ST.streak.count||0)+" day"+((ST.streak.count===1)?"":"s"))+"</div>"+
      "<div class='card'><h3>Reset</h3><div class='content small'><p class='danger'>Clears all progress on this device.</p></div><div class='btnrow'><button class='btn' style='background:#36161a;border-color:#ff6b6b;color:#ffd9d9' id='resetAll'>Reset all progress</button></div></div>"+
      "<div class='kbd'>v"+DATA.meta.version+" &middot; encrypted &middot; progress on this device only</div>";
    document.getElementById("resetAll").onclick=function(){ if(confirm("Reset all study progress on this device?")){ ["modules","cards","quiz","defend","teach","streak","tab"].forEach(function(k){ try{ localStorage.removeItem(NS+"."+k); }catch(e){} });
      ST.modules={};ST.cards={};ST.quiz={best:0,attempts:0,last:0,perQ:{}};ST.defend={};ST.teach={};ST.streak={lastDay:null,count:0}; renderAll(); refreshGauge(); renderProgress(); toast("Progress reset"); } };
  }

  function renderAll(){ renderLearn(); renderDiagram(); renderListen(); renderQuiz(); renderDefend(); renderTeach(); }
  renderAll(); refreshGauge(); setTab(ST.tab||"learn");
}
</script>
</body>
