<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<meta name="color-scheme" content="dark">
<title>Self Test</title>
<!--
  Encrypted content. Safe to host publicly: this file carries only an AES-GCM
  ciphertext plus the decrypt logic. No plaintext, no identifiers. The key is
  supplied via the URL fragment (#k=...), which browsers never send to the server,
  or typed into the field, then cached in localStorage. Decryption + render happen
  entirely in the browser. Mobile-safe CSS: explicit hex only, no var(), no gradients.
-->
<style>
  *{box-sizing:border-box}
  html,body{margin:0;background:#0c0f17}
  body{color:#e8ebf2;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;-webkit-text-size-adjust:100%}
  #lock{min-height:90vh;display:flex;align-items:center;justify-content:center;padding:24px}
  #lock .box{max-width:380px;width:100%;background:#141925;border:1px solid #242c3c;border-radius:16px;padding:24px;text-align:center}
  #lock .dot{width:34px;height:34px;border-radius:50%;background:#0c0f17;border:2px solid #e0a458;margin:0 auto 14px}
  #lock h1{font-family:Georgia,serif;font-size:20px;margin:0 0 6px;color:#f3ede2}
  #lock p{color:#aab3c5;font-size:13.5px;margin:0 0 16px}
  #lock input{width:100%;background:#0c0f17;border:1px solid #2c3447;color:#e8ebf2;border-radius:10px;padding:12px;font-size:15px;margin-bottom:10px}
  #lock button{width:100%;background:#e0a458;color:#0c0f17;border:none;border-radius:10px;padding:12px 14px;font-size:14.5px;font-weight:700;cursor:pointer}
  #lock .err{color:#e8919f;font-size:13px;min-height:18px;margin-top:8px}
  #lock .spin{color:#8ea0bd;font-size:13px;min-height:18px;margin-top:4px}
  #card{display:none}
</style>
</head>
<body>
<div id="lock">
  <div class="box">
    <div class="dot"></div>
    <h1>Self Test</h1>
    <p id="lockMsg">Open with your link, or enter the passphrase.</p>
    <input id="passIn" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="passphrase">
    <button id="unlockBtn">Open</button>
    <div class="spin" id="lockSpin"></div>
    <div class="err" id="lockErr"></div>
  </div>
</div>
<div id="card"></div>
<script>
"use strict";
var PAYLOAD = {"v":1,"kdf":"PBKDF2","hash":"SHA-256","iters":250000,"salt":"a+jWSGdGHYOf0ST18cGJ6Q==","iv":"1XKsppIyBBx7mNOa","ct":"236B2+Ylbnhz8wxP9bWwkxktsADqxQneaUOc0Qa7zR7o9ucAvJpxzjsq7yE46BKmVvpc7jdcBgJta5E4SQzYpFpWdLuqycgllJJExuWWHzLQ5xJDb7K1Jqq/rcbunN6vxaVZxbfsefY3RsL54hFn"};
var NSK = "pc.c-selftest";
function b64ToBytes(b64){var s=atob(b64);var a=new Uint8Array(s.length);for(var i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function deriveKey(pass,salt,iters){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw",enc.encode(pass),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt:salt,iterations:iters,hash:"SHA-256"},base,{name:"AES-GCM",length:256},false,["decrypt"]);
}
async function decryptPayload(pass){
  var key=await deriveKey(pass,b64ToBytes(PAYLOAD.salt),PAYLOAD.iters);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64ToBytes(PAYLOAD.iv)},key,b64ToBytes(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}
function getKeyFromHash(){
  var h=location.hash||"";if(h[0]==="#")h=h.slice(1);
  var parts=h.split("&");
  for(var i=0;i<parts.length;i++){var kv=parts[i].split("=");if(kv[0]==="k")return decodeURIComponent(kv[1]||"");}
  return null;
}
async function tryUnlock(pass,fromHash){
  var err=document.getElementById("lockErr"),spin=document.getElementById("lockSpin");
  err.textContent="";spin.textContent="Opening...";
  try{
    var json=await decryptPayload(pass);
    var data=JSON.parse(json);
    spin.textContent="";
    try{localStorage.setItem(NSK,pass);}catch(e){}
    document.getElementById("lock").style.display="none";
    var c=document.getElementById("card");
    c.innerHTML=data.html||"";
    c.style.display="block";
    if(data.title)document.title=data.title;
    window.scrollTo(0,0);
  }catch(e){
    spin.textContent="";
    err.textContent=fromHash?"Saved link could not open it. Enter the passphrase.":"Wrong passphrase. Try again.";
    document.getElementById("passIn").focus();
  }
}
(function init(){
  document.getElementById("unlockBtn").onclick=function(){tryUnlock(document.getElementById("passIn").value.trim(),false);};
  document.getElementById("passIn").addEventListener("keydown",function(e){if(e.key==="Enter")tryUnlock(this.value.trim(),false);});
  var k=getKeyFromHash()||(function(){try{return localStorage.getItem(NSK);}catch(e){return null;}})();
  if(k){document.getElementById("lockMsg").textContent="Opening...";tryUnlock(k,true);}
  else{document.getElementById("passIn").focus();}
})();
</script>
</body>
</html>
