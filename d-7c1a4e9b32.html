<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Shared files</title>
<style>
  /* Mobile-safe palette: explicit hex colors only, per the flows card constraints. */
  html,body{margin:0;padding:0;background:#0d0f12;color:#e7eaee;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%;}
  .wrap{max-width:560px;margin:0 auto;padding:28px 18px 60px;}
  h1{font-size:20px;font-weight:600;margin:0 0 4px;letter-spacing:.2px;}
  .sub{font-size:13px;color:#8b94a0;margin:0 0 22px;line-height:1.5;}
  .banner{display:none;background:#13241a;border:1px solid #2f6b46;color:#9be3b4;
    font-size:12.5px;border-radius:9px;padding:9px 12px;margin:0 0 16px;}
  .banner.show{display:block;}
  .card{display:block;background:#161a20;border:1px solid #262c35;border-radius:12px;
    padding:14px 15px;margin:0 0 12px;text-decoration:none;color:inherit;}
  .card .label{font-size:15px;font-weight:600;color:#f1f4f8;margin:0 0 3px;}
  .card .meta{font-size:12px;color:#7e8893;}
  .card .name{font-size:11.5px;color:#5f6873;margin-top:2px;word-break:break-all;}
  .card .act{display:inline-block;margin-top:10px;font-size:13px;font-weight:600;
    color:#0d0f12;background:#7cc4ff;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;}
  .card .act:disabled{background:#3a4350;color:#8b94a0;cursor:default;}
  .card.fresh{border-color:#2f6b46;}
  .pill{display:inline-block;font-size:10.5px;color:#9be3b4;border:1px solid #2f6b46;
    border-radius:999px;padding:1px 7px;margin-left:7px;vertical-align:middle;}
  .note{font-size:12px;color:#6b7480;margin-top:24px;line-height:1.5;}
  .state{font-size:14px;color:#aab3bf;line-height:1.6;padding:8px 0;}
  .state b{color:#e7eaee;}
  a.foot{color:#7cc4ff;text-decoration:none;}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="head">Shared files</h1>
  <p class="sub" id="sub">Loading…</p>
  <div class="banner" id="banner"></div>
  <div id="list"></div>
  <div id="state" class="state"></div>
  <p class="note" id="note" style="display:none">These files update automatically. Leave this page open or re-download anytime to get the latest version.</p>
</div>
<script>
"use strict";
(function(){
  var ITERS = 250000;
  var POLL_MS = 20000;
  var base = location.pathname.replace(/\.html?$/, "") + "-files/";
  var listEl = document.getElementById("list");
  var subEl = document.getElementById("sub");
  var stateEl = document.getElementById("state");
  var bannerEl = document.getElementById("banner");
  var noteEl = document.getElementById("note");

  function showState(html){ stateEl.innerHTML = html; }
  function bust(u){ return u + (u.indexOf("?")<0?"?":"&") + "t=" + Date.now(); }

  function getKey(){
    var h = location.hash || "";
    var m = h.match(/[#&]k=([^&]+)/);
    return m ? decodeURIComponent(m[1]) : null;
  }

  function fmtSize(n){
    if (n == null) return "";
    if (n < 1024) return n + " B";
    if (n < 1048576) return (n/1024).toFixed(0) + " KB";
    return (n/1048576).toFixed(1) + " MB";
  }
  function fmtWhen(ms){
    if (!ms) return "";
    var s = Math.max(0, (Date.now()-ms)/1000);
    if (s < 45) return "updated just now";
    if (s < 3600) return "updated " + Math.round(s/60) + " min ago";
    if (s < 86400) return "updated " + Math.round(s/3600) + " hr ago";
    return "updated " + Math.round(s/86400) + " days ago";
  }

  function ab2u8(ab){ return new Uint8Array(ab); }
  async function sha256hex(u8){
    var d = await crypto.subtle.digest("SHA-256", u8);
    return Array.prototype.map.call(new Uint8Array(d), function(b){return ("0"+b.toString(16)).slice(-2);}).join("");
  }
  async function fetchBytes(url){
    var r = await fetch(bust(base+url), {cache:"no-store"});
    if (!r.ok) throw new Error("HTTP "+r.status+" for "+url);
    return ab2u8(await r.arrayBuffer());
  }

  var KEY = null, SALT = null;
  async function deriveKey(pass, salt){
    var bk = await crypto.subtle.importKey("raw", new TextEncoder().encode(pass), "PBKDF2", false, ["deriveKey"]);
    return crypto.subtle.deriveKey(
      {name:"PBKDF2", salt:salt, iterations:ITERS, hash:"SHA-256"},
      bk, {name:"AES-GCM", length:256}, false, ["decrypt"]);
  }
  // file layout: [iv:12][ciphertext]
  async function decryptFile(u8){
    var iv = u8.slice(0,12), ct = u8.slice(12);
    var pt = await crypto.subtle.decrypt({name:"AES-GCM", iv:iv}, KEY, ct);
    return new Uint8Array(pt);
  }

  function lock(msg){
    subEl.textContent = "";
    showState(msg);
    noteEl.style.display = "none";
  }

  var lastManifestSig = "";
  var current = {}; // id -> sha256 (to detect per-file changes)

  function render(manifest, changedIds){
    subEl.textContent = manifest.files.length + (manifest.files.length===1?" file":" files") + " · " + fmtWhen(manifest.built);
    noteEl.style.display = "block";
    showState("");
    listEl.innerHTML = "";
    manifest.files.forEach(function(f){
      var card = document.createElement("div");
      card.className = "card" + (changedIds.indexOf(f.id)>=0 ? " fresh" : "");
      var fresh = changedIds.indexOf(f.id)>=0 ? '<span class="pill">updated</span>' : "";
      card.innerHTML =
        '<div class="label">'+escapeHtml(f.label)+fresh+'</div>'+
        '<div class="meta">'+escapeHtml(fmtSize(f.size))+'</div>'+
        '<div class="name">'+escapeHtml(f.name)+'</div>';
      var btn = document.createElement("button");
      btn.className = "act"; btn.textContent = "Download";
      btn.onclick = function(){ doDownload(f, btn); };
      card.appendChild(btn);
      listEl.appendChild(card);
    });
  }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]; }); }

  async function doDownload(f, btn){
    var old = btn.textContent; btn.disabled = true; btn.textContent = "Decrypting…";
    try{
      var enc = await fetchBytes(f.id + ".enc");
      var bytes = await decryptFile(enc);
      var got = await sha256hex(bytes);
      if (f.sha256 && got !== f.sha256) throw new Error("integrity check failed");
      var blob = new Blob([bytes], {type: f.mime || "application/octet-stream"});
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a");
      a.href = url; a.download = f.name; document.body.appendChild(a); a.click();
      document.body.removeChild(a);
      setTimeout(function(){ URL.revokeObjectURL(url); }, 4000);
      btn.textContent = "Downloaded ✓";
      setTimeout(function(){ btn.disabled=false; btn.textContent=old; }, 2500);
    } catch(e){
      btn.textContent = "Failed, retry";
      setTimeout(function(){ btn.disabled=false; }, 1500);
    }
  }

  async function loadManifest(isPoll){
    var enc;
    try { enc = await fetchBytes("manifest.enc"); }
    catch(e){ if(!isPoll) lock("These files are not available right now."); return; }
    var sig = await sha256hex(enc);
    if (isPoll && sig === lastManifestSig) return;     // nothing changed
    var manifest;
    try { manifest = JSON.parse(new TextDecoder().decode(await decryptFile(enc))); }
    catch(e){
      if(!isPoll) lock("<b>This link needs its key.</b><br>Open the complete link you were sent. The key is the part after <b>#</b> at the end of the URL.");
      return;
    }
    // detect which files changed since last render
    var changed = [];
    manifest.files.forEach(function(f){
      if (current[f.id] !== undefined && current[f.id] !== f.sha256) changed.push(f.id);
      current[f.id] = f.sha256;
    });
    lastManifestSig = sig;
    render(manifest, changed);
    if (isPoll && changed.length){
      bannerEl.textContent = "Updated to the latest version.";
      bannerEl.classList.add("show");
      setTimeout(function(){ bannerEl.classList.remove("show"); }, 6000);
    }
  }

  async function main(){
    if (!window.crypto || !crypto.subtle){ lock("This browser cannot open secure files. Try Chrome, Safari, or Firefox."); return; }
    var pass = getKey();
    if (!pass){ lock("<b>This link needs its key.</b><br>Open the complete link you were sent. The key is the part after <b>#</b> at the end of the URL."); return; }
    try { SALT = await fetchBytes("salt.bin"); }
    catch(e){ lock("These files are not available right now."); return; }
    KEY = await deriveKey(pass, SALT);
    await loadManifest(false);
    setInterval(function(){ loadManifest(true); }, POLL_MS);
    // refresh relative timestamps every 30s
    setInterval(function(){ if(lastManifestSig) loadManifest(false); }, 60000);
  }
  main();
})();
</script>
</body>
</html>
