<style>
  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:#0b1020; color:#e9eefa;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    line-height:1.62; padding:0 0 64px; -webkit-text-size-adjust:100%}
  .wrap{max-width:820px; margin:0 auto; padding:0 18px}
  a{color:#7fb2ec}

  /* lock screen */
  #lock{min-height:88vh; display:flex; align-items:center; justify-content:center; padding:24px}
  #lock .box{max-width:430px; width:100%; background:#0e1a31; border:1px solid #21304f; border-radius:14px; padding:24px}
  #lock h1{font-size:18px; margin:0 0 6px}
  #lock p{color:#93a6c6; font-size:13.5px; margin:0 0 14px}
  #lock input{width:100%; background:#0a1426; border:1px solid #2a3a5e; color:#e9eefa; border-radius:10px; padding:11px 12px; font-size:15px; margin-bottom:10px}
  #lock button{width:100%; background:#2f78c4; color:#ffffff; border:1px solid #6aa6e6; border-radius:10px; padding:11px 14px; font-size:14px; font-weight:600; cursor:pointer}
  #lock .err{color:#ff6b6b; font-size:13px; min-height:18px; margin-top:8px}
  #lock .spin{color:#93a6c6; font-size:13px; margin-top:8px}

  /* shell */
  #app{display:none}
  header.top{position:sticky; top:0; z-index:30; background:#0b1020; border-bottom:1px solid #1b2740; padding:14px 0 12px}
  .brandrow{display:flex; align-items:baseline; flex-wrap:wrap; gap:8px 12px}
  .title{font-size:21px; font-weight:700; letter-spacing:.2px}
  .subtitle{color:#93a6c6; font-size:13.5px}
  .pills{margin-top:8px; display:flex; gap:8px; flex-wrap:wrap}
  .pill{font-size:11.5px; color:#bcd0ee; background:#10203b; border:1px solid #23344f; border-radius:999px; padding:3px 10px}
  .pill.live{color:#a9e7c2; background:#0e2418; border-color:#1f5238}

  main{padding-top:22px}
  h2.sec{font-size:17px; font-weight:700; margin:30px 0 6px; padding-top:18px; border-top:1px solid #18233b}
  p{margin:10px 0}
  p.lead{font-size:15.5px}
  p.sub{color:#9fb2cf; font-size:13.5px}
  .product{font-size:19px; font-weight:700; color:#cfe2ff; background:#0f1d36; border:1px solid #243a5e; border-left:4px solid #2f78c4; border-radius:10px; padding:14px 16px; margin:6px 0 14px}
  .note{background:#11203a; border:1px solid #243a5e; border-left:4px solid #d7a93c; border-radius:10px; padding:12px 14px; font-size:13.8px; color:#dfe8f6; margin:8px 0}
  .bridge{background:#101e36; border:1px solid #243a5e; border-left:4px solid #6aa6e6; border-radius:10px; padding:12px 14px; font-size:14px; margin:12px 0}

  .lanes{display:flex; gap:12px; flex-wrap:wrap; margin:12px 0}
  .lane{flex:1 1 280px; background:#0e1a31; border:1px solid #213050; border-radius:12px; padding:14px 16px}
  .lane .lh{font-size:11.5px; color:#7fb2ec; font-weight:700; letter-spacing:.6px; text-transform:uppercase}
  .lane .lt{font-size:15.5px; font-weight:700; margin:2px 0 6px}
  .lane p{font-size:13.8px; color:#d4deee; margin:0}

  figure.diagram{margin:14px 0 4px}
  figure.diagram img{display:block; width:100%; height:auto; border:1px solid #243a5e; border-radius:12px; background:#0a1426}
  figure.diagram figcaption{color:#9fb2cf; font-size:12.5px; margin-top:8px}

  ol.slides{list-style:none; counter-reset:s; padding:0; margin:12px 0}
  ol.slides li{counter-increment:s; position:relative; padding:9px 0 9px 40px; border-bottom:1px solid #16223a}
  ol.slides li:before{content:counter(s); position:absolute; left:0; top:9px; width:26px; height:26px; line-height:26px; text-align:center; font-size:12.5px; font-weight:700; color:#bcd0ee; background:#12233f; border:1px solid #28395a; border-radius:7px}
  ol.slides .st{display:block; font-weight:650; font-size:14.5px}
  ol.slides .sd{display:block; color:#9fb2cf; font-size:13px; margin-top:2px}

  ul.stats{padding-left:18px; margin:10px 0}
  ul.stats li{margin:7px 0; font-size:14px}

  .foot{margin-top:34px; padding-top:14px; border-top:1px solid #1b2740; color:#7f93b3; font-size:12.5px}
  b,strong{color:#f0f5ff}
</style>
</head>

<div id="lock">
  <div class="box">
    <h1>Design preview</h1>
    <p id="lockMsg">This preview is protected. Open it with your link, or enter the passphrase below.</p>
    <input id="passIn" type="password" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false" placeholder="passphrase">
    <button id="unlockBtn">Open</button>
    <div class="spin" id="lockSpin"></div>
    <div class="err" id="lockErr"></div>
  </div>
</div>

<div id="app">
  <header class="top">
    <div class="wrap">
      <div class="brandrow">
        <span class="title" id="appTitle"></span>
        <span class="subtitle" id="appSub"></span>
      </div>
      <div class="pills">
        <span class="pill live">working preview</span>
        <span class="pill" id="appUpdated"></span>
      </div>
    </div>
  </header>
  <main><div class="wrap" id="content"></div></main>
</div>

// ===== crypto (WebCrypto, matches the Node build params) =====
function b64ToBytes(b64){ var s=atob(b64); var a=new Uint8Array(s.length); for(var i=0;i<s.length;i++) a[i]=s.charCodeAt(i); return a; }
async function deriveKey(pass, salt, iters){
  var enc=new TextEncoder();
  var base=await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt:salt, iterations:iters, hash:"SHA-256"},
    base, {name:"AES-GCM", length:256}, false, ["decrypt"]);
}
async function decryptPayload(pass){
  var key=await deriveKey(pass, b64ToBytes(PAYLOAD.salt), PAYLOAD.iters);
  var pt=await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(PAYLOAD.iv)}, key, b64ToBytes(PAYLOAD.ct));
  return new TextDecoder().decode(pt);
}

// ===== unlock flow =====
var NSK="cogprev1.k";
function getKeyFromHash(){
  var h=location.hash||""; if(h[0]==="#") h=h.slice(1);
  var parts=h.split("&");
  for(var i=0;i<parts.length;i++){ var kv=parts[i].split("="); if(kv[0]==="k") return decodeURIComponent(kv[1]||""); }
  return null;
}
async function tryUnlock(pass, fromHash){
  var err=document.getElementById("lockErr"), spin=document.getElementById("lockSpin");
  err.textContent=""; spin.textContent="Opening...";
  try{
    var json=await decryptPayload(pass);
    var data=JSON.parse(json);
    spin.textContent="";
    try{ localStorage.setItem(NSK, pass); }catch(e){}
    document.getElementById("lock").style.display="none";
    document.getElementById("app").style.display="block";
    render(data);
  }catch(e){
    spin.textContent="";
    err.textContent = fromHash ? "Saved link could not open it. Enter the passphrase." : "Wrong passphrase. Try again.";
    document.getElementById("passIn").focus();
  }
}
(function initLock(){
  document.getElementById("unlockBtn").onclick=function(){ tryUnlock(document.getElementById("passIn").value.trim(), false); };
  document.getElementById("passIn").addEventListener("keydown",function(e){ if(e.key==="Enter") tryUnlock(this.value.trim(), false); });
  var k=getKeyFromHash() || (function(){ try{ return localStorage.getItem(NSK); }catch(e){ return null; } })();
  if(k){ document.getElementById("lockMsg").textContent="Opening your preview..."; tryUnlock(k, true); }
  else { document.getElementById("passIn").focus(); }
})();

// ===== render (runs after decryption) =====
function render(DATA){
  document.title = DATA.title || "Design Preview";
  document.getElementById("appTitle").textContent = DATA.title || "";
  document.getElementById("appSub").textContent = DATA.subtitle || "";
  var up=document.getElementById("appUpdated");
  if(DATA.updated){ up.textContent = "updated " + DATA.updated; } else { up.style.display="none"; }
  document.getElementById("content").innerHTML = DATA.html || "";
  window.scrollTo(0,0);
}
</script>
